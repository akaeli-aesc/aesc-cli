name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide details below.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checks
      options:
        - label: I have searched existing issues to ensure this isn't a duplicate
          required: true
        - label: I have read the roadmap and this feature isn't already planned
          required: true
        - label: This aligns with aesc's purpose (AI-powered security testing)
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when I need to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this feature to work?
      placeholder: aesc should be able to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there any workarounds or alternative solutions?
      placeholder: I could manually do X, but...

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - New security tool integration
        - AI/LLM improvements
        - User interface/UX
        - Documentation
        - Performance
        - Safety/Security
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority (Your Opinion)
      description: How important is this to you?
      options:
        - Critical (blocking my work)
        - High (would save significant time)
        - Medium (nice to have)
        - Low (minor improvement)
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Usage Examples
      description: Show how this feature would be used
      placeholder: |
        ```bash
        aesc "new feature command here"
        ```

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information, mockups, or references
      placeholder: |
        - Similar features in other tools:
        - Relevant documentation:

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to implement this feature and submit a PR
          required: false
